<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lost the vibe ✦ Aura Club</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#FBF4EC">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    /* Self-contained so this page renders from any URL depth */
    :root{
      --cream:#FBF4EC;--ink:#241B33;--ink-soft:#4A3E5C;--violet:#6C4CF1;--pink:#FF5DA2;--lime:#D8FF57;
      --aura:linear-gradient(120deg,#FF7AE0,#A97BFF,#6EC7FF,#7CF5C9);
      --font-display:"Fredoka","Trebuchet MS",system-ui,sans-serif;
      --font-body:"Space Grotesk",system-ui,sans-serif;
      --font-mono:"Space Mono",monospace;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;padding:32px;
      font-family:var(--font-body);color:var(--ink);background:var(--cream);overflow:hidden}
    body::before{content:"";position:fixed;inset:-20vmax;z-index:-1;
      background:radial-gradient(40vmax 40vmax at 15% 12%,rgba(255,122,224,.18),transparent 60%),
                 radial-gradient(40vmax 40vmax at 85% 10%,rgba(110,199,255,.18),transparent 60%),
                 radial-gradient(46vmax 46vmax at 75% 90%,rgba(124,245,201,.18),transparent 62%);
      filter:blur(6px);animation:drift 22s ease-in-out infinite alternate}
    @keyframes drift{to{transform:translate(2%,-2%) rotate(4deg) scale(1.06)}}
    @keyframes hue{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    .code{font-family:var(--font-display);font-weight:700;font-size:clamp(6rem,26vw,15rem);line-height:.9;margin:0}
    .bead{display:inline-block;width:.8em;height:.8em;border-radius:50%;background:var(--aura);
      background-size:200% 200%;border:5px solid var(--ink);vertical-align:-2%;
      box-shadow:5px 5px 0 var(--ink);animation:hue 5s ease-in-out infinite,floaty 3s ease-in-out infinite}
    .eyebrow{font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.2em;font-size:.8rem;color:var(--violet)}
    h1{font-family:var(--font-display);font-size:clamp(1.6rem,5vw,2.6rem);margin:.2em 0 .3em}
    p{color:var(--ink-soft);max-width:44ch;margin:0 auto 26px}
    .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .btn{font-family:var(--font-display);font-weight:600;font-size:1.05rem;padding:15px 26px;border:2.5px solid var(--ink);
      border-radius:999px;box-shadow:4px 4px 0 var(--ink);background:var(--violet);color:#fff;text-decoration:none;
      transition:transform .18s cubic-bezier(.68,-.55,.27,1.55),box-shadow .18s}
    .btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
    .btn--lime{background:var(--lime);color:var(--ink)}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">✦ Error 404 ✦</p>
    <p class="code">4<span class="bead" aria-hidden="true"></span>4</p>
    <h1>This page lost its aura.</h1>
    <p>The bracelet you're looking for wandered off — but the whole shiny collection is still right here.</p>
    <div class="row">
      <a class="btn" id="home" href="index.html">Take me home ✦</a>
      <a class="btn btn--lime" id="shop" href="shop.html">Shop bracelets</a>
    </div>
  </main>
  <script>
    (function () {
      // Compute a base that works locally AND on GitHub Pages project sites.
      var segs = location.pathname.split("/");
      var base = location.origin + "/";
      if (segs.length > 2 && segs[1]) base += segs[1] + "/";
      var home = document.getElementById("home");
      var shop = document.getElementById("shop");
      if (home) home.href = base;
      if (shop) shop.href = base + "shop.html";
    })();
  </script>
</body>
</html>
